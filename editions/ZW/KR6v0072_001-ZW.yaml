body:
  text: 一心敬禮清淨真如無去無來不生不滅寂然常住坦矣恒安千佛共遵十方同敬恒沙功德非色非心南無清淨法身毗盧遮那佛一心敬禮毗盧遮那千葉蓮花四智珍寶德山無極願海無邊積行三祇累功十地光充法界體滿虛空南無圓滿報身盧舍那佛一心敬禮如來生地雪山之北香山之東城號加維姓釋迦氏父名淨飯母曰摩耶十九出家三十成道南無千百億化身釋迦牟尼佛一心敬禮甚深微妙金剛般若不可思議生諸佛身滅凡夫罪無人無我聲空色空苦惱蓋纏因此永寂南無般若波羅蜜多甚深法藏一心敬禮舍衛城南須達園中祇陀林下如來精舍聖眾禪房於彼伽藍說斯般若我今恭敬追念世尊南無般若波羅蜜多甚深法藏錄文完方廣錩修訂終審
